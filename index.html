<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>读心术解密</title>
    <link rel="preload" href="imgs/bg.png" as="image">
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div id="app">
        <div class="start-screen" id="startScreen">
            <div class="start-panel">
                <h1 class="start-title">读心术解密</h1>
                <button id="startBtn">开始<br>探索</button>
            </div>
        </div>

        <div class="app-shell" id="appShell">
            <header class="app-header">
                <div class="header-tip-slot">
                    <div class="header-robot">💡</div>
                    <div class="header-tip" id="normalTip"></div>
                </div>
            </header>

            <div class="main-layout">
                <aside class="sidebar">
                    <div class="flow">
                        <div class="sidebar-title" style="justify-content: center;">心里想的两位数</div>
                        <div class="inputFixed">
                            <div class="digit-inputs">
                                <div class="digit-cell" id="cellTen">
                                    <input type="tel" id="inputTen" inputmode="numeric" maxlength="1"
                                        autocomplete="off" />
                                    <span class="digit-label">十位</span>
                                </div>
                                <span class="digit-sep">·</span>
                                <div class="digit-cell" id="cellGe">
                                    <input type="tel" id="inputGe" inputmode="numeric" maxlength="1"
                                        autocomplete="off" />
                                    <span class="digit-label">个位</span>
                                </div>
                            </div>
                            <button type="button" id="randomBtn" class="random-btn">
                                <span class="random-icon">🎲</span>
                                <span class="random-text">随机</span>
                            </button>
                        </div>

                        <div class="calc-record-wrapper">
                            <div class="sidebar-title" style="margin-top: 8px;">
                                <span class="title-left">心里的数</span>
                                <span class="title-right">结果</span>
                            </div>
                            <div class="calc-record-area" id="calcRecordArea">
                                <div class="calc-record-list multi-mode" id="calcRecordList"></div>
                            </div>
                        </div>

                        <div class="flow-keypad">
                            <div class="numpad" id="numpad">
                                <button type="button" class="numpad-btn" data-digit="1">1</button>
                                <button type="button" class="numpad-btn" data-digit="2">2</button>
                                <button type="button" class="numpad-btn" data-digit="3">3</button>
                                <button type="button" class="numpad-btn" data-digit="4">4</button>
                                <button type="button" class="numpad-btn" data-digit="5">5</button>
                                <button type="button" class="numpad-btn" data-digit="6">6</button>
                                <button type="button" class="numpad-btn" data-digit="7">7</button>
                                <button type="button" class="numpad-btn" data-digit="8">8</button>
                                <button type="button" class="numpad-btn" data-digit="9">9</button>
                                <button type="button" class="numpad-btn" data-digit="0">0</button>
                            </div>
                            <div class="numpad-actions">
                                <button type="button" class="numpad-btn clear-btn" id="numpadClear">清空</button>
                                <button type="button" class="numpad-btn del-btn" id="numpadDel2">
                                    <svg class="del-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                        <path fill="currentColor"
                                            d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z" />
                                    </svg>
                                    删除
                                </button>
                            </div>
                        </div>
                    </div>
                </aside>

                <section class="board-panel">
                    <div class="boardWrap">
                        <div class="board" id="board"></div>
                        <div class="secret-btn-slot">
                            <button type="button" id="secretBtn" class="locked">
                                <span class="btn-icon">🔒</span>发现数学规律
                            </button>
                        </div>
                    </div>

                </section>
            </div>
            <div class="focus-overlay" id="focusOverlay">
                <div class="focus-fly-layer" id="focusFlyLayer"></div>
                <button id="continueExploreBtn">继续探索</button>
            </div>
        </div>
    </div>

    <div class="page-loading">
        <span>LOADING</span>
        <div class="loading">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="voiceAudio" preload="auto"></audio>
    <audio id="effectAudio" preload="auto"></audio>
    <script src="mzone-global.2026-05-28.js"></script>
    <script src="./app.js"></script>
</body>

</html>
