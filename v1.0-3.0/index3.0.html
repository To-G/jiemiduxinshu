<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>读心术解密</title>
    <script>
        window.inject = function (_mortonH5) {
            window.mortonH5 = _mortonH5;
        };
    </script>
    <link rel="stylesheet" href="./style3.0.css" />
</head>

<body>
    <div id="app">
        <div class="start-screen" id="startScreen">
            <div class="start-panel">
                <h1 class="start-title">读心术解密</h1>
                <button id="startBtn">开始<br>探索</button>
            </div>
        </div>

        <div class="app-shell" id="appShell">
            <header class="app-header">
                <div class="header-tip-slot">
                    <div class="header-robot">💡</div>
                    <div class="header-tip" id="normalTip"></div>
                </div>
            </header>

            <div class="main-layout">
                <aside class="sidebar">
                    <div class="flow">
                        <div class="sidebar-title" style="justify-content: center;">心里想的两位数</div>
                        <div class="inputFixed">
                            <div class="digit-inputs">
                                <div class="digit-cell" id="cellTen">
                                    <input type="tel" id="inputTen" inputmode="numeric" maxlength="1"
                                        autocomplete="off" />
                                    <span class="digit-label">十位</span>
                                </div>
                                <span class="digit-sep">·</span>
                                <div class="digit-cell" id="cellGe">
                                    <input type="tel" id="inputGe" inputmode="numeric" maxlength="1"
                                        autocomplete="off" />
                                    <span class="digit-label">个位</span>
                                </div>
                            </div>
                            <button type="button" id="randomBtn" class="random-btn" style="display: none;">🎲</button>
                        </div>

                        <div class="calc-record-wrapper">
                            <div class="sidebar-title" style="margin-top: 8px;">
                                <span class="title-left">心里的数</span>
                                <span class="title-right">结果</span>
                            </div>
                            <div class="calc-record-area" id="calcRecordArea">
                                <div class="calc-record-list multi-mode" id="calcRecordList"></div>
                            </div>
                        </div>

                        <div class="flow-keypad">
                            <div class="numpad" id="numpad">
                                <button type="button" class="numpad-btn" data-digit="1">1</button>
                                <button type="button" class="numpad-btn" data-digit="2">2</button>
                                <button type="button" class="numpad-btn" data-digit="3">3</button>
                                <button type="button" class="numpad-btn" data-digit="4">4</button>
                                <button type="button" class="numpad-btn" data-digit="5">5</button>
                                <button type="button" class="numpad-btn" data-digit="6">6</button>
                                <button type="button" class="numpad-btn" data-digit="7">7</button>
                                <button type="button" class="numpad-btn" data-digit="8">8</button>
                                <button type="button" class="numpad-btn" data-digit="9">9</button>
                                <button type="button" class="numpad-btn" data-digit="0">0</button>
                            </div>
                            <div class="numpad-actions">
                                <button type="button" class="numpad-btn clear-btn" id="numpadClear">清空</button>
                                <button type="button" class="numpad-btn del-btn" id="numpadDel2">
                                    <svg class="del-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                        <path fill="currentColor"
                                            d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z" />
                                    </svg>
                                    删除
                                </button>
                            </div>
                        </div>
                    </div>
                </aside>

                <section class="board-panel">
                    <div class="boardWrap">
                        <div class="board" id="board"></div>
                        <div class="secret-btn-slot">
                            <button type="button" id="secretBtn" class="locked">
                                <span class="btn-icon">🔒</span>发现数学规律
                            </button>
                        </div>
                    </div>
                    <div class="board-hint" id="boardHint">
                        <div class="hint-header">
                            <span class="hint-icon">✨</span>
                            <span class="hint-text">找一找<br>数学规律</span>
                        </div>
                        <div class="lit-numbers-list" id="litNumbersList"></div>
                    </div>
                </section>
            </div>
            <div class="focus-overlay" id="focusOverlay">
                <div class="focus-fly-layer" id="focusFlyLayer"></div>
                <button id="continueExploreBtn">继续探索</button>
            </div>
        </div>
    </div>

    <div class="page-loading">
        <span>LOADING</span>
        <div class="loading">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <div class="modal-overlay" id="replayModal" style="display: none;">
        <div class="replay-card">
            <h2>🎉 恭喜你，数学小侦探！</h2>
            <p>你已经成功破解了神奇的“读心术”！</p>
            <p class="replay-desc">发现了吗？无论你写什么两位数，经过那个巧妙的手写公式，最后的结果都必然是 <b>9 的倍数</b>（即 9, 18, 27, 36 等）！这就是为什么我们在网格纸上把所有
                9 倍数的格子都放上了相同的图案，这样你就觉得自己被看穿了心思。这就是数学的奇妙奥秘！</p>
            <button id="replayBtn">再次挑战新秘密</button>
        </div>
    </div>

    <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
    <audio id="voiceAudio" preload="auto"></audio>
    <audio id="effectAudio" preload="auto"></audio>

    <div class="debug-panel collapsed" id="debugPanel">
        <div class="debug-header" id="debugToggle">
            <span class="debug-icon">⚙️</span>
            <span class="debug-title">控制台</span>
            <span class="debug-arrow">▼</span>
        </div>
        <div class="debug-content" id="debugContent">
            <div class="debug-item">
                <label>记录展示模式</label>
                <div class="record-mode-toggle" id="recordModeToggle" style="margin-top: 4px;">
                    <label class="mode-option">
                        <input type="radio" name="rMode" value="single">
                        <span>一步多行</span>
                    </label>
                    <label class="mode-option active">
                        <input type="radio" name="rMode" value="multi" checked>
                        <span>一步一行</span>
                    </label>
                </div>
            </div>
            <div class="debug-item debug-item-switch">
                <label for="showLitListToggle">显示右侧数学规律列</label>
                <input type="checkbox" id="showLitListToggle">
            </div>
            <div class="debug-item debug-item-switch">
                <label for="enableGuideVoiceToggle">开启引导语音</label>
                <input type="checkbox" id="enableGuideVoiceToggle" checked>
            </div>
            <div class="debug-item debug-item-switch">
                <label for="showGuideTextToggle">显示引导文字</label>
                <input type="checkbox" id="showGuideTextToggle" checked>
            </div>
            <div class="debug-item">
                <label for="unlitOpacitySlider">未点亮格子亮度</label>
                <input type="range" id="unlitOpacitySlider" min="0" max="100" value="50">
            </div>
            <div class="debug-item debug-item-switch">
                <label for="matrixPersistentToggle">矩阵亮度常在</label>
                <input type="checkbox" id="matrixPersistentToggle" checked>
            </div>
            <div class="debug-item">
                <label for="themeSelect">界面配色方案</label>
                <select id="themeSelect"
                    style="width: 100%; padding: 4px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; cursor: pointer;">
                    <option value="theme-1">配色1：复古书桌 (默认)</option>
                    <option value="theme-2">配色2：清新海洋</option>
                    <option value="theme-3">配色3：星际魔法</option>
                </select>
            </div>
        </div>
    </div>

    <script src="mzone-global.2026-05-28.js"></script>
    <script src="./app3.0.js"></script>
</body>

</html>
