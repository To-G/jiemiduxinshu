<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音生成工具 (Fish Audio)</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            font-size: 15px;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .settings input:not([type="range"]) {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
        }

        .settings input:read-only {
            background-color: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .result-section.active {
            display: flex;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .download-btn {
            background-color: #10b981;
        }

        .download-btn:hover {
            background-color: #059669;
        }

        .status {
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }
        
        .status.error {
            color: #ef4444;
        }
        
        .status.success {
            color: #10b981;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>语音生成工具</h1>
            <p>基于 Fish Audio 接口合成 MP3 语音</p>
        </div>

        <div class="input-group">
            <label for="textInput">要合成的文本：</label>
            <textarea id="textInput" placeholder="请输入要转换为语音的文本..."></textarea>
        </div>

        <div class="settings">
            <div class="input-group">
                <label>API Key (只读)</label>
                <input type="text" value="917e2aebbde647e4acb001139343812c" readonly>
            </div>
            <div class="input-group">
                <label>Reference ID (只读)</label>
                <input type="text" value="25b0f52b8b254fb0a57133bc7230825b" readonly>
            </div>
            <div class="input-group" style="grid-column: 1 / -1; margin-top: 5px;">
                <label for="speedInput" style="display: flex; justify-content: space-between;">
                    <span>语速调整：<span id="speedValue">1.0</span>x</span>
                    <span style="color: var(--text-muted); font-weight: normal; font-size: 12px;">范围: 0.5 - 2.0</span>
                </label>
                <input type="range" id="speedInput" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
        </div>

        <button id="generateBtn" class="btn">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">生成语音</span>
        </button>

        <div id="statusMsg" class="status"></div>

        <div class="result-section" id="resultSection">
            <audio id="audioPlayer" controls></audio>
            <button id="downloadBtn" class="btn download-btn">⬇️ 下载 MP3 文件</button>
        </div>
    </div>

    <script>
        const API_KEY = '917e2aebbde647e4acb001139343812c';
        const REF_ID = '25b0f52b8b254fb0a57133bc7230825b';
        const PROXY_URL = 'https://fish-audio-proxy.dlttog.workers.dev/';

        const textInput = document.getElementById('textInput');
        const speedInput = document.getElementById('speedInput');
        const speedValue = document.getElementById('speedValue');
        const generateBtn = document.getElementById('generateBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const statusMsg = document.getElementById('statusMsg');
        const resultSection = document.getElementById('resultSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentBlobUrl = null;

        speedInput.addEventListener('input', (e) => {
            speedValue.textContent = Number(e.target.value).toFixed(1);
        });

        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) {
                showStatus('请输入要合成的文本！', 'error');
                return;
            }

            // 清理状态
            setLoading(true);
            showStatus('正在生成语音，请稍候...', '');
            resultSection.classList.remove('active');
            
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'model': 's2.1-pro-free'
                    },
                    body: JSON.stringify({
                        text: text,
                        reference_id: REF_ID,
                        format: 'mp3',
                        prosody: {
                            speed: Number(speedInput.value)
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 请求失败，状态码: ${response.status}`);
                }

                const blob = await response.blob();
                currentBlobUrl = URL.createObjectURL(blob);
                
                audioPlayer.src = currentBlobUrl;
                resultSection.classList.add('active');
                
                showStatus('生成成功！', 'success');
                
                // 自动播放
                audioPlayer.play().catch(e => console.log('Auto-play prevented:', e));

            } catch (error) {
                console.error(error);
                showStatus(`生成失败: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentBlobUrl) return;
            
            const text = textInput.value.trim();
            // 用文本的前几个字作为文件名
            let safeName = text.substring(0, 10).replace(/[\\\/\:\*\?\"\<\>\|]/g, '');
            if (!safeName) safeName = 'voice';
            
            const a = document.createElement('a');
            a.href = currentBlobUrl;
            a.download = `语音_${safeName}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        function setLoading(isLoading) {
            generateBtn.disabled = isLoading;
            spinner.style.display = isLoading ? 'inline-block' : 'none';
            btnText.textContent = isLoading ? '生成中...' : '生成语音';
        }

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status ' + type;
        }
    </script>
</body>
</html>
